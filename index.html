<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sarah's Journey</title>

  <meta name="theme-color" content="#7C3AED">
  <meta name="description" content="Sarah's Journey - Deine persönliche Gesundheits- und Fitness-App">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="header">

<h1>💜 Sarah's Journey</h1>

<p>Hallo Sarah 👋</p>

<p id="date"></p>

</header>

<main>

<div class="weight-card">

<div class="weight-icon">
⚖️
</div>

<h1 id="currentWeight">
62.0 kg
</h1>

<p class="subtitle">
Aktuelles Gewicht
</p>


<div class="progress-labels">
    <div>
        <small>Start</small>
        <strong>82.3 kg</strong>
    </div>

    <div>
        <small>Heute</small>
        <strong id="todayWeight">62.0 kg</strong>
    </div>
</div>

<div class="progress">
    <div class="progress-fill"></div>
    <div class="progress-dot"></div>
</div>

<p class="goal">
🎯 Noch <strong>3.0 kg</strong> bis zum Ziel (59.0 kg)
</p>
</div>

<div class="grid">

<div class="small-card">
🔥
<h3>Kalorien</h3>
<p>0 / 1500</p>
</div>

<div class="small-card">
💪
<h3>Protein</h3>
<p>0 g</p>
</div>

<div class="small-card">
💧
<h3>Wasser</h3>
<p>0 L</p>
</div>

<div class="small-card">
🚶
<h3>Schritte</h3>
<p>0</p>
</div>

</div>

</main>

<button class="fab">+</button>

<nav class="bottom-nav">
<button>🏠</button>
<button>🍽️</button>
<button>📈</button>
<button>🤖</button>
<button>⚙️</button>
</nav>

</div>

<script src="js/app.js"></script>

</body>
</html>
